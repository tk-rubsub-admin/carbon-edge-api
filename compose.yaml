services:
  carbonedge-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carbonedge-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SERVER_PORT: 8080
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_AUTH_TOKEN_SECRET: ${APP_AUTH_TOKEN_SECRET}
      APP_AUTH_TOKEN_TTL_MINUTES: ${APP_AUTH_TOKEN_TTL_MINUTES:-1440}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      APP_CUSTOMER_VERIFY_EMAIL_URL_BASE: ${APP_CUSTOMER_VERIFY_EMAIL_URL_BASE:-http://localhost:3000/verify-email}
      APP_CUSTOMER_MAIL_FROM: ${APP_CUSTOMER_MAIL_FROM:-no-reply@example.com}
      APP_CUSTOMER_MAIL_SUBJECT: ${APP_CUSTOMER_MAIL_SUBJECT:-Verify your email address}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_SMTP_CONNECTION_TIMEOUT: ${MAIL_SMTP_CONNECTION_TIMEOUT:-5000}
      MAIL_SMTP_TIMEOUT: ${MAIL_SMTP_TIMEOUT:-5000}
      MAIL_SMTP_WRITE_TIMEOUT: ${MAIL_SMTP_WRITE_TIMEOUT:-5000}

openapi: 3.1.0
info:
  title: Ecommerce Platform API
  version: 1.0.0
  description: |
    Initial API specification for ecommerce backend built with Java Spring Boot.
    This version focuses on Product resource only.

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Products
    description: Product management APIs
  - name: Categories
    description: Category management APIs
  - name: Cart
    description: Shopping cart APIs
  - name: Customers
    description: Customer management APIs
  - name: Merchants
    description: Merchant management APIs

paths:
  /products:
    get:
      tags:
        - Products
      summary: Get product list
      description: Retrieve paginated list of products with optional filters
      operationId: listProducts
      parameters:
        - name: page
          in: query
          description: Page number (0-based)
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: keyword
          in: query
          description: Search by product name, SKU, or description
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          description: Filter by category ID
          required: false
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          description: Filter by product status
          required: false
          schema:
            $ref: '#/components/schemas/ProductStatus'
        - name: inStock
          in: query
          description: Filter by stock availability
          required: false
          schema:
            type: boolean
        - name: featured
          in: query
          description: Filter featured products
          required: false
          schema:
            type: boolean
        - name: sort
          in: query
          description: Sort format เช่น createdAt,desc หรือ price,asc
          required: false
          schema:
            type: string
            example: createdAt,desc
      responses:
        '200':
          description: Product list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResponse'

    post:
      tags:
        - Products
      summary: Create product
      description: Create a new product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: SKU or slug already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{productId}:
    get:
      tags:
        - Products
      summary: Get product detail
      description: Retrieve product by ID
      operationId: getProductById
      parameters:
        - $ref: '#/components/parameters/ProductIdPathParam'
      responses:
        '200':
          description: Product detail retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Products
      summary: Update product
      description: Update existing product by ID
      operationId: updateProduct
      parameters:
        - $ref: '#/components/parameters/ProductIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: SKU or slug already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Products
      summary: Delete product
      description: Soft delete or remove product by ID
      operationId: deleteProduct
      parameters:
        - $ref: '#/components/parameters/ProductIdPathParam'
      responses:
        '204':
          description: Product deleted successfully
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /categories:
    get:
      tags:
        - Categories
      summary: Get category list
      description: Retrieve all categories
      operationId: listCategories
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by category status
          schema:
            $ref: '#/components/schemas/CategoryStatus'
        - name: parentId
          in: query
          required: false
          description: Filter by parent category ID
          schema:
            type: integer
            format: int64
        - name: keyword
          in: query
          required: false
          description: Search by category name or slug
          schema:
            type: string
      responses:
        '200':
          description: Category list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'

    post:
      tags:
        - Categories
      summary: Create category
      description: Create a new category
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Category slug already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /categories/{categoryId}:
    get:
      tags:
        - Categories
      summary: Get category detail
      description: Retrieve category by ID
      operationId: getCategoryById
      parameters:
        - $ref: '#/components/parameters/CategoryIdPathParam'
      responses:
        '200':
          description: Category retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Categories
      summary: Update category
      description: Update category by ID
      operationId: updateCategory
      parameters:
        - $ref: '#/components/parameters/CategoryIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Category slug already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Categories
      summary: Delete category
      description: Delete category by ID
      operationId: deleteCategory
      parameters:
        - $ref: '#/components/parameters/CategoryIdPathParam'
      responses:
        '204':
          description: Category deleted successfully
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /carts:
    post:
      tags:
        - Cart
      summary: Create cart
      description: Create a new shopping cart
      operationId: createCart
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCartRequest'
      responses:
        '201':
          description: Cart created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'

  /carts/{cartId}:
    get:
      tags:
        - Cart
      summary: Get cart detail
      description: Retrieve cart by ID
      operationId: getCartById
      parameters:
        - $ref: '#/components/parameters/CartIdPathParam'
      responses:
        '200':
          description: Cart retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Cart
      summary: Delete cart
      description: Delete or clear cart by ID
      operationId: deleteCart
      parameters:
        - $ref: '#/components/parameters/CartIdPathParam'
      responses:
        '204':
          description: Cart deleted successfully
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /carts/{cartId}/items:
    post:
      tags:
        - Cart
      summary: Add item to cart
      description: Add a product to shopping cart
      operationId: addCartItem
      parameters:
        - $ref: '#/components/parameters/CartIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
      responses:
        '200':
          description: Item added to cart successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cart or product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /carts/{cartId}/items/{cartItemId}:
    put:
      tags:
        - Cart
      summary: Update cart item
      description: Update quantity of cart item
      operationId: updateCartItem
      parameters:
        - $ref: '#/components/parameters/CartIdPathParam'
        - $ref: '#/components/parameters/CartItemIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemRequest'
      responses:
        '200':
          description: Cart item updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cart or cart item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Cart
      summary: Remove cart item
      description: Remove item from cart
      operationId: removeCartItem
      parameters:
        - $ref: '#/components/parameters/CartIdPathParam'
        - $ref: '#/components/parameters/CartItemIdPathParam'
      responses:
        '200':
          description: Cart item removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '404':
          description: Cart or cart item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers:
    post:
      tags:
        - Customers
      summary: Create customer
      description: Register a new customer
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email or phone number already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Customers
      summary: Get customer list
      description: Retrieve paginated list of customers
      operationId: listCustomers
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: keyword
          in: query
          required: false
          description: Search by email, phone number, first name, last name, or display name
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/CustomerStatus'
        - name: isEmailVerified
          in: query
          required: false
          schema:
            type: boolean
        - name: isPhoneVerified
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Customer list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerPageResponse'

  /customers/{customerId}:
    get:
      tags:
        - Customers
      summary: Get customer detail
      description: Retrieve customer by ID
      operationId: getCustomerById
      parameters:
        - $ref: '#/components/parameters/CustomerIdPathParam'
      responses:
        '200':
          description: Customer retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Customers
      summary: Update customer
      description: Update customer by ID
      operationId: updateCustomer
      parameters:
        - $ref: '#/components/parameters/CustomerIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerRequest'
      responses:
        '200':
          description: Customer updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email or phone number already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Customers
      summary: Delete customer
      description: Soft delete or deactivate customer by ID
      operationId: deleteCustomer
      parameters:
        - $ref: '#/components/parameters/CustomerIdPathParam'
      responses:
        '204':
          description: Customer deleted successfully
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}/addresses:
    get:
      tags:
        - Customers
      summary: Get customer addresses
      description: Retrieve all addresses of a customer
      operationId: listCustomerAddresses
      parameters:
        - $ref: '#/components/parameters/CustomerIdPathParam'
      responses:
        '200':
          description: Customer addresses retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAddressListResponse'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Customers
      summary: Create customer address
      description: Add a new address to customer
      operationId: createCustomerAddress
      parameters:
        - $ref: '#/components/parameters/CustomerIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerAddressRequest'
      responses:
        '201':
          description: Customer address created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAddressResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}/addresses/{addressId}:
    put:
      tags:
        - Customers
      summary: Update customer address
      description: Update customer address by ID
      operationId: updateCustomerAddress
      parameters:
        - $ref: '#/components/parameters/CustomerIdPathParam'
        - $ref: '#/components/parameters/AddressIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerAddressRequest'
      responses:
        '200':
          description: Customer address updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAddressResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Customer or address not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Customers
      summary: Delete customer address
      description: Delete customer address by ID
      operationId: deleteCustomerAddress
      parameters:
        - $ref: '#/components/parameters/CustomerIdPathParam'
        - $ref: '#/components/parameters/AddressIdPathParam'
      responses:
        '204':
          description: Customer address deleted successfully
        '404':
          description: Customer or address not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /merchants:
    post:
      tags:
        - Merchants
      summary: Create merchant
      description: Create a new merchant
      operationId: createMerchant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMerchantRequest'
      responses:
        '201':
          description: Merchant created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Merchant code, slug, email, or tax ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Merchants
      summary: Get merchant list
      description: Retrieve paginated list of merchants
      operationId: listMerchants
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: keyword
          in: query
          required: false
          description: Search by merchant code, shop name, legal name, email, or tax ID
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/MerchantStatus'
        - name: businessType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/MerchantBusinessType'
        - name: isOfficial
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Merchant list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantPageResponse'

  /merchants/{merchantId}:
    get:
      tags:
        - Merchants
      summary: Get merchant detail
      description: Retrieve merchant by ID
      operationId: getMerchantById
      parameters:
        - $ref: '#/components/parameters/MerchantIdPathParam'
      responses:
        '200':
          description: Merchant retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantResponse'
        '404':
          description: Merchant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Merchants
      summary: Update merchant
      description: Update merchant by ID
      operationId: updateMerchant
      parameters:
        - $ref: '#/components/parameters/MerchantIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMerchantRequest'
      responses:
        '200':
          description: Merchant updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Merchant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Merchant code, slug, email, or tax ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Merchants
      summary: Delete merchant
      description: Soft delete or deactivate merchant by ID
      operationId: deleteMerchant
      parameters:
        - $ref: '#/components/parameters/MerchantIdPathParam'
      responses:
        '204':
          description: Merchant deleted successfully
        '404':
          description: Merchant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /merchants/{merchantId}/addresses:
    get:
      tags:
        - Merchants
      summary: Get merchant addresses
      description: Retrieve all addresses of a merchant
      operationId: listMerchantAddresses
      parameters:
        - $ref: '#/components/parameters/MerchantIdPathParam'
      responses:
        '200':
          description: Merchant addresses retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAddressListResponse'
        '404':
          description: Merchant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Merchants
      summary: Create merchant address
      description: Add a new address to merchant
      operationId: createMerchantAddress
      parameters:
        - $ref: '#/components/parameters/MerchantIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMerchantAddressRequest'
      responses:
        '201':
          description: Merchant address created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAddressResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Merchant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /merchants/{merchantId}/addresses/{addressId}:
    put:
      tags:
        - Merchants
      summary: Update merchant address
      description: Update merchant address by ID
      operationId: updateMerchantAddress
      parameters:
        - $ref: '#/components/parameters/MerchantIdPathParam'
        - $ref: '#/components/parameters/AddressIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMerchantAddressRequest'
      responses:
        '200':
          description: Merchant address updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAddressResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Merchant or address not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Merchants
      summary: Delete merchant address
      description: Delete merchant address by ID
      operationId: deleteMerchantAddress
      parameters:
        - $ref: '#/components/parameters/MerchantIdPathParam'
        - $ref: '#/components/parameters/AddressIdPathParam'
      responses:
        '204':
          description: Merchant address deleted successfully
        '404':
          description: Merchant or address not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    ProductIdPathParam:
      name: productId
      in: path
      required: true
      description: Product ID
      schema:
        type: integer
        format: int64
        minimum: 1

    CategoryIdPathParam:
      name: categoryId
      in: path
      required: true
      description: Category ID
      schema:
        type: integer
        format: int64
        minimum: 1

    CartIdPathParam:
      name: cartId
      in: path
      required: true
      description: Cart ID
      schema:
